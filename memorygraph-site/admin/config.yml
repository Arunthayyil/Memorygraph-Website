# ─────────────────────────────────────────────────────────────
# MEMORYGRAPH WEDDINGS — CMS CONFIGURATION
# This file controls what you can edit in your dashboard.
# ─────────────────────────────────────────────────────────────

backend:
  name: git-gateway
  branch: main

# Where uploaded images get stored
media_folder: "memorygraph-site/assets/uploads"
public_folder: "/assets/uploads"

# Editorial workflow (lets you save drafts before publishing)
publish_mode: editorial_workflow

# Site URL - update this once domain is connected
site_url: https://memorygraph.netlify.app
display_url: https://memorygraph.netlify.app
logo_url: https://memorygraph.netlify.app/admin/logo.png

# ─────────────────────────────────────────────────────────────
# CONTENT TYPES YOU CAN EDIT
# ─────────────────────────────────────────────────────────────

collections:

  # ═══════════════════════════════════════════════════════════
  # 1. WEDDING STORIES (the main thing you'll add monthly)
  # ═══════════════════════════════════════════════════════════
  - name: "stories"
    label: "💍 Wedding Stories"
    label_singular: "Wedding Story"
    description: "Add a new wedding to your portfolio. Appears on Homepage and Stories page."
    folder: "memorygraph-site/content/stories"
    create: true
    slug: "{{slug}}"
    sortable_fields: ['date']
    view_filters:
      - label: "Featured Stories"
        field: featured
        pattern: true
    fields:
      - { name: "couple_names", label: "Couple Names", widget: "string", hint: "e.g. Abhin & Gayathry" }
      - { name: "location", label: "Location", widget: "string", hint: "e.g. Vadakkumnathan Temple · Thrissur" }
      - { name: "year", label: "Year", widget: "number", value_type: "int", min: 2018, max: 2030, default: 2025 }
      - { name: "date", label: "Wedding Date", widget: "datetime", date_format: "DD MMMM YYYY", time_format: false }
      - name: "category"
        label: "Category"
        widget: "select"
        options: ["Temple Wedding", "Heritage Venue", "Destination", "Backwaters", "Intimate", "Garden", "Beach", "Resort"]
        default: "Temple Wedding"
      - { name: "featured", label: "Feature on Homepage?", widget: "boolean", default: false, hint: "Only mark 1-2 stories as featured" }
      - { name: "hero_image", label: "Hero Image", widget: "image", hint: "Main photo. 1600x1200px recommended." }
      - name: "gallery_images"
        label: "Gallery Images (Optional)"
        widget: "list"
        required: false
        summary: "{{fields.image}}"
        field: { name: "image", label: "Image", widget: "image" }
      - { name: "film_url", label: "Wedding Film URL (Optional)", widget: "string", required: false, hint: "YouTube or Vimeo link" }
      - { name: "story_excerpt", label: "Short Quote / Excerpt", widget: "text", required: false, hint: "1-2 sentence quote that appears on the story page" }
      - { name: "image_count", label: "Total Images Delivered", widget: "number", required: false, value_type: "int" }
      - { name: "film_duration", label: "Film Duration (e.g. '12 min')", widget: "string", required: false }

  # ═══════════════════════════════════════════════════════════
  # 2. JOURNAL / BLOG POSTS
  # ═══════════════════════════════════════════════════════════
  - name: "blog"
    label: "📝 Journal Posts"
    label_singular: "Journal Post"
    description: "Write articles, planning guides, behind-the-scenes posts."
    folder: "memorygraph-site/content/blog"
    create: true
    slug: "{{year}}-{{month}}-{{slug}}"
    sortable_fields: ['date']
    fields:
      - { name: "title", label: "Article Title", widget: "string" }
      - { name: "subtitle", label: "Subtitle / Excerpt", widget: "text", hint: "1-2 sentences shown in the grid" }
      - name: "category"
        label: "Category"
        widget: "select"
        options: ["Wedding Stories", "Planning Guides", "Behind the Scenes", "Style & Inspiration", "Kerala Culture"]
        default: "Wedding Stories"
      - { name: "date", label: "Publish Date", widget: "datetime", date_format: "DD MMMM YYYY", time_format: false }
      - { name: "read_time", label: "Read Time", widget: "string", default: "5 min read", hint: "e.g. '7 min read'" }
      - { name: "featured", label: "Feature at Top?", widget: "boolean", default: false }
      - { name: "cover_image", label: "Cover Image", widget: "image" }
      - { name: "author", label: "Author", widget: "string", default: "Arun T Chandran" }
      - { name: "body", label: "Article Body", widget: "markdown", hint: "Write naturally — formatting buttons above let you add headings, bold, links, images" }

  # ═══════════════════════════════════════════════════════════
  # 3. TESTIMONIALS
  # ═══════════════════════════════════════════════════════════
  - name: "testimonials"
    label: "💬 Testimonials"
    label_singular: "Testimonial"
    description: "Quotes from past couples. Rotates on Homepage."
    folder: "memorygraph-site/content/testimonials"
    create: true
    slug: "{{slug}}"
    fields:
      - { name: "couple_names", label: "Couple Names", widget: "string", hint: "e.g. Abhin & Gayathry" }
      - { name: "location", label: "Location", widget: "string", hint: "e.g. Thrissur, 2024" }
      - { name: "quote", label: "The Quote", widget: "text", hint: "Their words. Keep it real and specific." }
      - { name: "rating", label: "Star Rating", widget: "number", min: 1, max: 5, default: 5 }
      - { name: "show_on_homepage", label: "Show on Homepage?", widget: "boolean", default: true }
      - { name: "couple_photo", label: "Couple Photo (Optional)", widget: "image", required: false }

  # ═══════════════════════════════════════════════════════════
  # 4. SITE SETTINGS (singleton - edit, don't create new)
  # ═══════════════════════════════════════════════════════════
  - name: "settings"
    label: "⚙️ Site Settings"
    description: "Phone, email, social links — appears across the site."
    files:
      - name: "contact"
        label: "Contact Info"
        file: "memorygraph-site/content/settings/contact.json"
        fields:
          - { name: "phone", label: "Phone Number", widget: "string", default: "+91 82816 39563" }
          - { name: "whatsapp", label: "WhatsApp Number (no + or spaces)", widget: "string", default: "918281639563", hint: "Used in WhatsApp links" }
          - { name: "email", label: "Email Address", widget: "string", default: "hello@memorygraphweddings.com" }
          - { name: "studio_address", label: "Studio Address", widget: "text", default: "Thottupurath Building, Chungam, Thrissur, Kerala" }
          - { name: "instagram_url", label: "Instagram URL", widget: "string", required: false }
          - { name: "youtube_url", label: "YouTube URL", widget: "string", required: false }
          - { name: "facebook_url", label: "Facebook URL", widget: "string", required: false }
          - { name: "pinterest_url", label: "Pinterest URL", widget: "string", required: false }

      - name: "homepage"
        label: "Homepage Hero & Stats"
        file: "memorygraph-site/content/settings/homepage.json"
        fields:
          - { name: "hero_eyebrow", label: "Hero Eyebrow Text", widget: "string", default: "Boutique Wedding Studio · Kerala" }
          - { name: "hero_headline_1", label: "Hero Headline Line 1", widget: "string", default: "Love, told in" }
          - { name: "hero_headline_emphasis", label: "Hero Headline Emphasized Word", widget: "string", default: "quiet light" }
          - { name: "hero_headline_2", label: "Hero Headline Line 2", widget: "string", default: "and honest frames." }
          - { name: "hero_subline", label: "Hero Subtext", widget: "text" }
          - { name: "hero_video_url", label: "Hero Video URL", widget: "file", required: false, hint: "Upload your hero MP4 here. Under 8MB. No audio." }
          - { name: "weddings_per_year", label: "Weddings Per Year (stat)", widget: "number", value_type: "int", default: 12 }
          - { name: "years_active", label: "Years Active (stat)", widget: "number", value_type: "int", default: 6 }
          - { name: "total_weddings", label: "Total Weddings (stat)", widget: "string", default: "200+" }

      - name: "about"
        label: "About Page Content"
        file: "memorygraph-site/content/settings/about.json"
        fields:
          - { name: "portrait_image", label: "Arun's Portrait", widget: "image", required: false, hint: "Vertical photo. 1200x1500px recommended." }
          - { name: "intro_quote", label: "Opening Quote", widget: "text" }
          - { name: "bio", label: "Bio Paragraph", widget: "markdown" }
