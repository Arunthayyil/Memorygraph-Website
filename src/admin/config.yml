backend:
  name: github
  repo: Arunthayyil/Memorygraph-Website
  branch: main
  base_url: https://memorygraphweddings.com
  auth_endpoint: /api/auth

media_folder: "src/assets/uploads"
public_folder: "/assets/uploads"

collections:
  - name: "stories"
    label: "Wedding Stories"
    folder: "src/content/stories"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Location", name: "location", widget: "string" }
      - { label: "Location Short", name: "location_short", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "Hero Image", name: "hero", widget: "image" }
      - { label: "Quote", name: "quote", widget: "text" }
      - { label: "Quote By", name: "quote_by", widget: "string", required: false }
      - { label: "Chapter Title", name: "chapter_title", widget: "string", required: false }
      - { label: "Film URL", name: "film_url", widget: "string", required: false }
      - { label: "Stat Images", name: "stat_images", widget: "string", required: false }
      - { label: "Stat Hours", name: "stat_hours", widget: "string", required: false }
      - { label: "Stat Photographers", name: "stat_photographers", widget: "string", required: false }
      - { label: "Gallery", name: "gallery", widget: "list", field: { name: "row", widget: "object", fields: [
          { label: "Layout", name: "layout", widget: "select", options: ["full", "two", "three", "asym-l", "asym-r", "quote"] },
          { label: "Images", name: "images", widget: "list", field: { widget: "image" }, required: false },
          { label: "Text", name: "text", widget: "text", required: false }
        ]}}
      - { label: "Body", name: "body", widget: "markdown" }
      - { label: "Layout", name: "layout", widget: "hidden", default: "story.njk" }

  - name: "client_galleries"
    label: "Client Galleries"
    folder: "src/content/client-galleries"
    create: true
    slug: "{{slug}}"
    summary: "{{title}}"
    fields:
      - { label: "Client / Couple Name", name: "title", widget: "string" }
      - { label: "Display Name", name: "couple_names", widget: "string", required: false }
      - { label: "Gallery Password", name: "password", widget: "string" }
      - { label: "Layout", name: "layout", widget: "hidden", default: "client-gallery.njk" }
      - { label: "Hero Title", name: "hero_title", widget: "string", default: "Wedding gallery<br><em>delivery.</em>", hint: "HTML line breaks and <em> are supported." }
      - { label: "Intro", name: "intro", widget: "text" }
      - { label: "Selection Title", name: "selection_title", widget: "string", default: "Select the frames<br><em>you want printed.</em>" }
      - { label: "Selection Note", name: "selection_note", widget: "text" }
      - { label: "Hero Image", name: "hero_image", widget: "image" }
      - { label: "Secondary Hero Image", name: "hero_image_secondary", widget: "image", required: false }
      - { label: "Password Screen Image", name: "lock_image", widget: "image", required: false }
      - { label: "Film Quality Label", name: "film_quality", widget: "string", default: "4K", required: false }
      - { label: "WhatsApp Number", name: "whatsapp_number", widget: "string", default: "919846238073" }
      - { label: "Bulk Gallery Folder", name: "gallery_folder", widget: "string", required: false, hint: "Optional. Upload hundreds of images into a folder like assets/uploads/client-galleries/abhin-gayathry, then enter that folder path here. Images are auto-added and sorted by filename." }
      - label: "Gallery Items"
        name: "gallery_items"
        widget: "list"
        summary: "{{fields.item_type}} — {{fields.image_name}}{{fields.quote}}"
        hint: "Use this for quotes, special featured images, or hand-picked extras. Bulk folder images appear first, sorted by filename; these blocks appear after them in your chosen drag-and-drop order."
        fields:
          - { label: "Item Type", name: "item_type", widget: "select", options: ["image", "quote"], default: "image" }
          - { label: "Image", name: "image", widget: "image", required: false }
          - { label: "Image Code", name: "image_code", widget: "string", required: false, hint: "Example: MG-001. If blank, the page auto-generates one." }
          - { label: "Image Name", name: "image_name", widget: "string", required: false }
          - { label: "Category", name: "category", widget: "string", required: false, hint: "Example: Ceremony, Family, Portraits, Details. Filters are generated from these." }
          - { label: "Caption", name: "caption", widget: "text", required: false }
          - { label: "Quote", name: "quote", widget: "text", required: false }
          - { label: "Quote By", name: "quote_by", widget: "string", required: false }

  - name: "testimonials"
    label: "Testimonials"
    folder: "src/content/testimonials"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Location", name: "location", widget: "string" }
      - { label: "Order", name: "order", widget: "number", value_type: "int" }
      - { label: "Quote", name: "quote", widget: "text" }

  - name: "blog"
    label: "Journal"
    folder: "src/content/blog"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "Hero Image", name: "hero", widget: "image", required: false }
      - { label: "Body", name: "body", widget: "markdown" }
