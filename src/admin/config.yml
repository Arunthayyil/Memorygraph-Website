backend:
  name: github
  repo: Arunthayyil/Memorygraph-Website
  branch: main
  base_url: https://memorygraphweddings.com
  auth_endpoint: /api/auth

media_folder: "src/assets/uploads"
public_folder: "/assets/uploads"

collections:
  - name: "settings"
    label: "Site Settings"
    files:
      - name: "homepage"
        label: "Homepage"
        file: "src/_data/homepage.json"
        fields:
          - { label: "Hero Headline", name: "hero_headline", widget: "string", hint: "HTML allowed. Use <br> for line breaks and <em> for italic accent." }
          - { label: "Hero Subline", name: "hero_subline", widget: "text" }
          - { label: "Hero CTA Primary Text", name: "hero_cta_primary_text", widget: "string" }
          - { label: "Hero CTA Primary Link", name: "hero_cta_primary_link", widget: "string" }
          - { label: "Hero CTA Secondary Text", name: "hero_cta_secondary_text", widget: "string" }
          - { label: "Hero CTA Secondary Link", name: "hero_cta_secondary_link", widget: "string" }
          - { label: "Hero Trust Text", name: "hero_trust_text", widget: "string", hint: "Social proof line under hero buttons" }
          - { label: "About Label", name: "about_label", widget: "string" }
          - { label: "About Headline", name: "about_headline", widget: "string", hint: "HTML allowed." }
          - { label: "About Body", name: "about_body", widget: "text" }
          - { label: "About CTA Text", name: "about_cta_text", widget: "string" }
          - { label: "CTA Headline", name: "cta_headline", widget: "string", hint: "Final CTA section. HTML allowed." }
          - { label: "CTA Subline", name: "cta_subline", widget: "text" }
          - { label: "CTA Button Text", name: "cta_button_text", widget: "string" }

  - name: "stories"
    label: "Wedding Stories"
    folder: "src/content/stories"
    create: true
    slug: "{{slug}}"
    summary: "{{title}} — {{location_short}} · {{date | date('YYYY-MM-DD')}}"
    sortable_fields: ["date", "title", "location_short"]
    fields:
      - { label: "Title", name: "title", widget: "string", hint: "Couple names, e.g. Abhin & Gayathry" }
      - { label: "Location", name: "location", widget: "string", hint: "Full venue name, e.g. Vadakkumnathan Temple, Thrissur" }
      - { label: "Location Short", name: "location_short", widget: "string", hint: "City only, e.g. Thrissur" }
      - { label: "Date", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "Hero Image", name: "hero", widget: "image", hint: "Main cover image — shown on cards, hero, and social shares" }
      - { label: "Quote", name: "quote", widget: "text", hint: "A short quote from the couple or your reflection on the day" }
      - { label: "Quote By", name: "quote_by", widget: "string", required: false, hint: "e.g. Gayathry, the bride" }
      - { label: "Chapter Title", name: "chapter_title", widget: "string", required: false, hint: "HTML allowed. e.g. A morning of <em>quiet light</em>." }
      - { label: "Film URL", name: "film_url", widget: "string", required: false, hint: "YouTube embed URL if a film exists" }
      - { label: "Images Delivered", name: "stat_images", widget: "string", required: false, default: "800+" }
      - { label: "Hours of Coverage", name: "stat_hours", widget: "string", required: false, default: "12" }
      - { label: "Photographers", name: "stat_photographers", widget: "string", required: false, default: "2" }
      - { label: "Gallery Folder", name: "gallery_folder", widget: "string", required: false, hint: "Bulk upload: drop all images into a folder like assets/stories/couple-name/ then enter that path here. Images auto-layout in a magazine-style grid sorted by filename. Any manual gallery rows below appear after these." }
      - label: "Gallery (Manual)"
        name: "gallery"
        widget: "list"
        required: false
        hint: "Optional. Add extra images or quotes after the bulk folder images. Drag to reorder."
        field:
          name: "row"
          widget: "object"
          fields:
            - { label: "Type", name: "layout", widget: "select", options: ["image", "quote"], default: "image" }
            - { label: "Images", name: "images", widget: "list", field: { widget: "image" }, required: false, hint: "Add one or more images" }
            - { label: "Quote Text", name: "text", widget: "text", required: false, hint: "Only for quote type" }
      - { label: "Body", name: "body", widget: "markdown", hint: "The written story — appears below the opening quote" }
      - { label: "Layout", name: "layout", widget: "hidden", default: "story.njk" }

  - name: "client_galleries"
    label: "Client Galleries"
    folder: "src/content/client-galleries"
    create: true
    slug: "{{slug}}"
    summary: "{{title}}"
    fields:
      - { label: "Client / Couple Name", name: "title", widget: "string" }
      - { label: "Display Name", name: "couple_names", widget: "string", required: false }
      - { label: "Gallery Password", name: "password", widget: "string" }
      - { label: "Layout", name: "layout", widget: "hidden", default: "client-gallery.njk" }
      - { label: "Hero Title", name: "hero_title", widget: "string", default: "Wedding gallery<br><em>delivery.</em>", hint: "HTML line breaks and <em> are supported." }
      - { label: "Intro", name: "intro", widget: "text" }
      - { label: "Selection Title", name: "selection_title", widget: "string", default: "Select the frames<br><em>you want printed.</em>" }
      - { label: "Selection Note", name: "selection_note", widget: "text" }
      - { label: "Hero Image", name: "hero_image", widget: "image" }
      - { label: "Secondary Hero Image", name: "hero_image_secondary", widget: "image", required: false }
      - { label: "Password Screen Image", name: "lock_image", widget: "image", required: false }
      - { label: "Film Quality Label", name: "film_quality", widget: "string", default: "4K", required: false }
      - { label: "WhatsApp Number", name: "whatsapp_number", widget: "string", default: "919846238073" }
      - { label: "Bulk Gallery Folder", name: "gallery_folder", widget: "string", required: false, hint: "Optional. Upload hundreds of images into a folder like assets/uploads/client-galleries/abhin-gayathry, then enter that folder path here. Images are auto-added and sorted by filename." }
      - label: "Gallery Items"
        name: "gallery_items"
        widget: "list"
        summary: "{{fields.item_type}} — {{fields.image_name}}{{fields.quote}}"
        hint: "Use this for quotes, special featured images, or hand-picked extras. Bulk folder images appear first, sorted by filename; these blocks appear after them in your chosen drag-and-drop order."
        fields:
          - { label: "Item Type", name: "item_type", widget: "select", options: ["image", "quote"], default: "image" }
          - { label: "Image", name: "image", widget: "image", required: false }
          - { label: "Image Code", name: "image_code", widget: "string", required: false, hint: "Example: MG-001. If blank, the page auto-generates one." }
          - { label: "Image Name", name: "image_name", widget: "string", required: false }
          - { label: "Category", name: "category", widget: "string", required: false, hint: "Example: Ceremony, Family, Portraits, Details. Filters are generated from these." }
          - { label: "Caption", name: "caption", widget: "text", required: false }
          - { label: "Quote", name: "quote", widget: "text", required: false }
          - { label: "Quote By", name: "quote_by", widget: "string", required: false }

  - name: "testimonials"
    label: "Testimonials"
    folder: "src/content/testimonials"
    create: true
    slug: "{{slug}}"
    summary: "{{title}} — {{location}}"
    sortable_fields: ["order", "title"]
    fields:
      - { label: "Couple Name", name: "title", widget: "string", hint: "e.g. Abhin & Gayathry" }
      - { label: "Location", name: "location", widget: "string", hint: "e.g. Thrissur" }
      - { label: "Display Order", name: "order", widget: "number", value_type: "int", hint: "Lower number = appears first on the homepage" }
      - { label: "Quote", name: "quote", widget: "text", hint: "Keep it short — 2-3 sentences works best" }

  - name: "blog"
    label: "Journal"
    folder: "src/content/blog"
    create: true
    slug: "{{slug}}"
    summary: "{{title}} — {{category}} · {{date | date('YYYY-MM-DD')}}"
    sortable_fields: ["date", "title", "category"]
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "Updated", name: "updated", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false, required: false }
      - { label: "SEO Title", name: "seoTitle", widget: "string", required: false, hint: "Override the browser tab title. Leave blank to use the main title." }
      - { label: "Description", name: "description", widget: "text", hint: "For search engines — 150-160 characters ideal" }
      - { label: "Excerpt", name: "excerpt", widget: "text", hint: "Short preview shown on the blog listing page" }
      - { label: "Category", name: "category", widget: "select", options: ["Planning Guides", "Wedding Stories", "Photography Advice", "Kerala Weddings"] }
      - { label: "Hero Image", name: "hero", widget: "image", required: false }
      - { label: "Hero Alt Text", name: "imageAlt", widget: "string", required: false, hint: "Describe the image for accessibility" }
      - { label: "Featured Post", name: "featured", widget: "boolean", required: false, default: false, hint: "Pin to the top of the journal page" }
      - { label: "Author", name: "author", widget: "string", required: false, default: "Arun T Chandran" }
      - { label: "Tags", name: "tags", widget: "list", required: false, hint: "Comma-separated, e.g. Kerala, Hindu wedding, temple" }
      - { label: "Body", name: "body", widget: "markdown" }
